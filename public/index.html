<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>核去核從：核能背後的和平抉擇</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100% !important;
        height: 100% !important;
      }

      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0a0a0a;
        z-index: 500;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: sans-serif; color: #fff;
        text-align: center; padding: 32px;
      }
      #start-screen .subtitle {
        font-size: 12px;
        letter-spacing: 0.2em;
        opacity: 0.4;
        margin-bottom: 16px;
        text-transform: uppercase;
      }
      #start-screen h1 {
        font-size: 20px;
        font-weight: 700;
        line-height: 1.5;
        margin-bottom: 32px;
        max-width: 280px;
      }
      #start-btn {
        padding: 16px 48px;
        border-radius: 40px; border: 1px solid rgba(255,255,255,0.3);
        background: transparent; color: #fff;
        font-size: 16px; font-weight: 500;
        cursor: pointer; letter-spacing: 0.05em;
        transition: background 0.2s;
      }
      #start-btn:active { background: rgba(255,255,255,0.15); }

      #scan-hint {
        position: fixed;
        bottom: 160px; left: 0; right: 0;
        text-align: center; color: #fff;
        z-index: 100; pointer-events: none;
        font-family: sans-serif;
        display: none;
        padding: 0 32px;
        transition: opacity 0.5s;
      }
      #scan-hint p {
        font-size: 14px;
        line-height: 1.7;
        opacity: 0.85;
        background: rgba(0,0,0,0.45);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 14px 18px;
      }

      #ar-overlay {
        display: none; position: fixed;
        bottom: 0; left: 0; right: 0;
        padding: 0 20px 40px;
        z-index: 200; flex-direction: column; align-items: center;
      }
      #ar-overlay.visible { display: flex; }
      .ar-card {
        width: 100%; max-width: 420px;
        background: rgba(10,10,10,0.82);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px; padding: 22px 24px;
        color: #fff; font-family: sans-serif;
        animation: slideUp 0.4s ease;
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .ar-card .tag {
        font-size: 11px; letter-spacing: 0.15em;
        opacity: 0.45; margin-bottom: 8px;
        text-transform: uppercase;
      }
      .ar-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
      .ar-card p { font-size: 13px; opacity: 0.5; margin-bottom: 20px; }
      .ar-btn {
        display: block; width: 100%; padding: 14px;
        border-radius: 12px; border: none;
        background: #fff; color: #111;
        font-size: 15px; font-weight: 600;
        text-align: center; text-decoration: none;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <canvas id="xr-canvas"></canvas>

    <div id="start-screen">
      <p class="subtitle">互動展覽</p>
      <h1>核去核從：核能背後的和平抉擇</h1>
      <button id="start-btn">進入體驗</button>
    </div>

    <div id="scan-hint">
      <p>尋找一個展品並將相機對準該展品，該展品是一幅橫批，顯示湯川秀樹對和平理念的追求，貫穿了他晚年的思想與創作。</p>
    </div>

    <div id="ar-overlay">
      <div class="ar-card">
        <p class="tag">展品辨識成功</p>
        <h1 id="artwork-title"></h1>
        <p id="artwork-desc"></p>
        <a id="artwork-link" class="ar-btn" href="#" target="_blank" rel="noopener">了解更多 →</a>
      </div>
    </div>

    <script src="app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
      async
      crossorigin="anonymous"
      data-preload-chunks="slam">
    </script>
  </body>
</html>
